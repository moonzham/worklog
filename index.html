<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>worklog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.ico">
<link rel="stylesheet" href="css/style.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- LOGIN -->
<div id="view-login" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">worklog</div>
      <p class="login-sub">업무일지 · 이슈 · 간트차트를<br>한 곳에서 관리하세요</p>
      <div class="login-hr"></div>
      <button class="google-btn" onclick="doGoogleLogin()">
        <svg class="google-icon" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908C16.658 14.131 17.64 11.823 17.64 9.2z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Google 계정으로 로그인
      </button>
      <p class="login-note">Google 계정으로 로그인하여 업무일지와 이슈를 관리하세요</p>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none;flex-direction:column;flex:1;overflow:hidden">
  <div class="topnav">
    <span class="logo">worklog</span>
    <button class="tab-btn active" onclick="switchTab('calendar')">캘린더</button>
    <button class="tab-btn" onclick="switchTab('journal')">업무일지</button>
    <button class="tab-btn" onclick="switchTab('tasks')">업무목록</button>
    <button class="tab-btn" onclick="switchTab('gantt')">간트차트</button>
    <div class="nav-spacer"></div>
    <span class="nav-version">ver 1.07</span>
    <div class="nav-search-wrap">
      <input class="nav-search-input" id="nav-search-input" placeholder="일지·업무 검색" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="nav-search-btn" onclick="doSearch()">🔍</button>
    </div>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>

  <!-- CALENDAR -->
  <div class="view active cal-view" id="view-calendar">
    <div class="cal-inner">
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
        <button class="cal-month-btn" id="month-label" onclick="toggleMonthReport()">2026년 6월</button>
        <button class="cal-nav" onclick="changeMonth(1)">›</button>
        <div class="cal-hdr-space"></div>
        <button class="cal-today-btn" onclick="goToday()">오늘</button>
      </div>
      <table class="cal-table">
        <thead>
          <tr>
            <th class="sun">일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th class="sat">토</th>
            <th class="week-col">주</th>
          </tr>
        </thead>
        <tbody id="cal-body"></tbody>
      </table>

      <div class="journal-box" id="journal-box" style="display:none">
        <div class="journal-box-label">
          <span id="journal-box-label">업무일지</span>
        </div>
        <div class="journal-view-area" id="journal-view" onclick="goToJournalDetail()"></div>
      </div>

      <div class="agenda-box" id="agenda-box" style="display:none">
        <div class="agenda-date-hdr" id="agenda-date-hdr"></div>
        <div id="agenda-list"></div>
      </div>

      <div class="report-box" id="month-report-box" style="display:none">
        <div class="report-hdr">
          <span class="report-title-txt" id="month-report-title">월간보고</span>
          <div class="report-actions">
            <button class="report-gen-btn" onclick="genReport('month')">✦ AI 생성</button>
            <button class="btn-sm primary" onclick="saveReport('month')">저장/수정</button>
          </div>
        </div>
        <div class="report-content"><textarea class="report-textarea" id="month-report-ta" placeholder="작성된 월간보고가 없습니다. AI 생성 버튼으로 보고서를 생성하거나 직접 입력하세요."></textarea></div>
      </div>

      <div class="report-box" id="week-report-box" style="display:none">
        <div class="report-hdr">
          <span class="report-title-txt" id="week-report-title">주간보고</span>
          <div class="report-actions">
            <button class="report-gen-btn" onclick="genReport('week')">✦ AI 생성</button>
            <button class="btn-sm primary" onclick="saveReport('week')">저장/수정</button>
          </div>
        </div>
        <div class="report-content"><textarea class="report-textarea" id="week-report-ta" placeholder="작성된 주간보고가 없습니다. AI 생성 버튼으로 보고서를 생성하거나 직접 입력하세요."></textarea></div>
      </div>
    </div>
  </div>

  <!-- SEARCH VIEW -->
  <div class="view search-view" id="view-search">
    <div class="search-inner">
      <div class="search-bar-wrap">
        <input class="search-bar-input" id="search-bar-input" placeholder="검색어를 입력하세요 (업무일지, 이슈코드, 이슈제목, 진행사항)" onkeydown="if(event.key==='Enter')doSearch()">
        <button class="search-bar-btn" onclick="doSearch()">검색</button>
      </div>
      <div class="search-keyword" id="search-keyword" style="display:none"></div>
      <div id="search-results"></div>
    </div>
  </div>

  <!-- JOURNAL LIST -->
  <div class="view jlist-view" id="view-journal">
    <div class="jlist-inner">
      <button class="jlist-load-btn" id="jlist-btn-up" onclick="loadMore('up')" style="display:none">↑ 이전 날짜 더 보기</button>
      <div id="journal-entries"></div>
      <button class="jlist-load-btn" id="jlist-btn-down" onclick="loadMore('down')" style="display:none">↓ 이후 날짜 더 보기</button>
    </div>
  </div>

  <!-- JOURNAL DETAIL -->
  <div class="view jdetail-view" id="view-jdetail">
    <div class="jdetail-inner">
      <button class="back-btn" onclick="goBack()">← 업무일지 목록</button>
      <div class="jdetail-card">
        <div class="jdetail-date" id="jd-date"></div>
        <div style="font-size:11px;font-weight:500;color:var(--text3);margin-bottom:6px">업무일지</div>
        <textarea class="jdetail-textarea" id="jd-textarea" placeholder="업무일지를 입력하세요..." oninput="onJournalEdit()"></textarea>
        <div class="jdetail-actions">
          <span class="unsaved-hint" id="unsaved-hint">● 저장되지 않은 변경사항</span>
          <button class="btn-sm primary" id="jd-save-btn" onclick="saveJournalDetail()">저장</button>
        </div>
        <div class="jdetail-issues-section" id="jd-issues-section">
          <div class="jdetail-issues-label">이 날의 업무 이슈</div>
          <div id="jd-issues"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- TASK LIST -->
  <div class="view task-view" id="view-tasks">
    <div class="task-inner">
      <div class="task-topbar">
        <div class="filter-bar">
          <button class="filter-chip active" onclick="filterTask(this,'all')">전체</button>
          <button class="filter-chip" onclick="filterTask(this,'진행중')">진행중</button>
          <button class="filter-chip" onclick="filterTask(this,'진행예정')">진행예정</button>
          <button class="filter-chip" onclick="filterTask(this,'테스트')">테스트</button>
          <button class="filter-chip" onclick="filterTask(this,'완료')">완료</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <select class="field-select" id="task-project-filter" onchange="renderTaskList()" style="font-size:12px;padding:5px 10px"></select>
          <button class="add-task-btn" onclick="openNewTask()">+ 업무등록</button>
        </div>
      </div>
      <table class="task-table">
        <thead>
          <tr>
            <th style="width:60px">중요도</th>
            <th style="width:88px">이슈번호</th>
            <th>이슈제목</th>
            <th style="width:92px">이슈등록일</th>
            <th style="width:92px">완료목표일</th>
            <th style="width:92px">개발시작일</th>
            <th style="width:92px">운영배포일</th>
            <th style="width:76px">상태</th>
          </tr>
        </thead>
        <tbody id="task-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ISSUE DETAIL -->
  <div class="view detail-view" id="view-detail">
    <div class="detail-inner">
      <button class="back-btn" id="detail-back-btn" onclick="goBack()">← 목록으로</button>
      <div class="detail-card">
        <div class="detail-id-row">
          <input type="hidden" id="d-seq">
          <input class="detail-id-input" id="d-id" placeholder="이슈코드 (선택, 예: DAR-145)" />
        </div>
        <input class="detail-title-input" id="d-title" placeholder="이슈 제목을 입력하세요" oninput="clearTitleError()" />
        <div class="detail-grid">
          <div class="detail-field">
            <span class="field-label">프로젝트</span>
            <select class="field-select" id="d-project">
            </select>
          </div>
          <div class="detail-field">
            <span class="field-label">중요도</span>
            <select class="field-select" id="d-priority">
              <option value="high">높음</option><option value="mid">중간</option><option value="low">낮음</option>
            </select>
          </div>
          <div class="detail-field">
            <span class="field-label">상태</span>
            <select class="field-select" id="d-status">
              <option>진행예정</option><option>진행중</option><option>테스트</option><option>완료</option><option>보류</option>
            </select>
          </div>
          <div class="detail-field">
            <span class="field-label">이슈 등록일</span>
            <input type="date" class="date-input" id="d-created">
          </div>
          <div class="detail-field">
            <span class="field-label">완료 목표일</span>
            <input type="date" class="date-input" id="d-due">
          </div>
          <div class="detail-field">
            <span class="field-label">개발 시작일</span>
            <input type="date" class="date-input" id="d-devstart">
          </div>
          <div class="detail-field">
            <span class="field-label">개발 완료일</span>
            <input type="date" class="date-input" id="d-devend">
          </div>
          <div class="detail-field">
            <span class="field-label">운영 배포일</span>
            <input type="date" class="date-input" id="d-deploy">
          </div>
          <div class="detail-field full">
            <span class="field-label">이슈 링크</span>
            <div class="link-wrap" id="d-link-wrap">
              <a class="link-display" id="d-link-display" href="#" target="_blank">링크 없음</a>
              <button class="link-edit-btn" onclick="toggleLinkEdit()">수정</button>
            </div>
            <div class="link-wrap" id="d-link-edit" style="display:none">
              <input class="link-input" id="d-link-input" type="url" placeholder="https://...">
              <button class="link-edit-btn" onclick="saveLinkEdit()">확인</button>
            </div>
          </div>
        </div>
        <div style="margin-top:14px">
          <div class="field-label" style="margin-bottom:6px">진행사항</div>
          <textarea class="progress-textarea" id="d-progress" placeholder="진행 내용을 입력하세요..."></textarea>
        </div>
        <div class="detail-save-row">
          <button class="btn-sm danger" id="detail-delete-btn" onclick="deleteIssueDetail()" style="display:none;margin-right:auto">삭제</button>
          <button class="btn-sm" onclick="goBack()">취소</button>
          <button class="btn-sm primary" onclick="saveIssueDetail()">저장</button>
        </div>
      </div>
    </div>
  </div>

  <!-- GANTT -->
  <div class="view gantt-view" id="view-gantt">
    <div class="gantt-topbar">
      <button class="cal-nav" onclick="expandGantt(-3)">‹</button>
      <button class="cal-today-btn" onclick="scrollGanttToday()">오늘</button>
      <button class="cal-nav" onclick="expandGantt(3)">›</button>
    </div>
    <div class="gantt-scroll">
      <div class="gantt-wrap" id="gantt-wrap"></div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/crud.js"></script>
<script src="js/app.js"></script>
<script src="js/calendar.js"></script>
<script src="js/journal.js"></script>
<script src="js/issue.js"></script>
<script src="js/search.js"></script>
</body>
</html>
